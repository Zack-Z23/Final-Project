        <h2>Recommended</h2>
        <div class="mainContainer">
            
          <div class = "link">
            <a href="MSIMotherboard.html"><img src="https://c1.neweggimages.com/ProductImageCompressAll1280/13-144-326-V01.jpg"></a>
            <p>MSI MAG B550 TOMAHAWK AM4 AMD B550 SATA 6Gb/s ATX AMD Motherboard</p>
              </div>
            </div>
        
             
        <script>
             var UL = document.getElementById("Searches");
            // hilde the list by default
            UL.style.display = "none";

            var searchBox = document.getElementById("Input");


            searchBox.addEventListener("focus",  function(){
            UL.style.display = "block";
            });
            
            searchBox.addEventListener("CPU",  function(){
            UL.style.display = "block";
            });
            searchBox.addEventListener("GPU",  function(){
            UL.style.display = "block";
            });
            searchBox.addEventListener("Racing Wheel",  function(){
            UL.style.display = "block";
            });





            searchBox.addEventListener("emptied", function(){
            UL.style.display = "none";
            });


            function myFunction() {
    
              var input, filter, ul, li, a, i;
              input = document.getElementById("Input");
              filter = input.value.toUpperCase();
              ul = document.getElementById("Searches");
              li = ul.getElementsByTagName("li");
                  for (i = 0; i < li.length; i++) {
                      a = li[i].getElementsByTagName("a")[0];
                        if (a.innerHTML.toUpperCase().indexOf(filter) > -1) {
                              li[i].style.display = "";
                                  } else  {
                                      li[i].style.display = "none";
                                          }
              }
            }
        </script>
